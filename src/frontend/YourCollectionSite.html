<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Your Collection</title>
    <link rel="stylesheet" href="YourCollectionStyle.css">
</head>
<body>
<main class="app">
    <header>
        <h1>Your Collection Playground</h1>
        <p>Verbinde das Spring-Backend mit dem Browser und verwalte deine Lieblingsstädte über HTTP.</p>
    </header>

    <section class="card">
        <h2>1. Datenstruktur wählen</h2>
        <div class="structure-picker">
            <button type="button" data-type="list" class="active">List</button>
            <button type="button" data-type="set">Set</button>
            <button type="button" data-type="queue">Queue</button>
        </div>
        <p class="hint">Alle Anfragen gehen an <code>http://localhost:8080/getConnection</code></p>
    </section>

    <section class="card">
        <h2>2. Städte verwalten</h2>
        <div class="form-grid">
            <label>
                Neue Stadt
                <input type="text" id="city-input" placeholder="z. B. Saarbrücken">
            </label>
            <button type="button" id="add-city">Hinzufügen</button>

            <label>
                Stadt entfernen
                <input type="text" id="remove-input" placeholder="Name der Stadt">
            </label>
            <button type="button" id="remove-city" class="danger">Löschen</button>

            <label>
                Suche nach Stadt
                <input type="text" id="search-input" placeholder="Name der Stadt">
            </label>
            <button type="button" id="search-city" class="secondary">Prüfen</button>
        </div>
        <div id="message" role="status"></div>
    </section>

    <section class="card">
        <h2>3. Route anzeigen</h2>
        <div class="toolbar">
            <label>Sortierung
                <select id="order-select">
                    <option value="input">Einfügereihenfolge</option>
                    <option value="asc">Alphabetisch (A-Z)</option>
                    <option value="desc">Alphabetisch (Z-A)</option>
                </select>
            </label>
            <button type="button" id="refresh" class="secondary">Aktualisieren</button>
        </div>
        <ul id="route-list"></ul>
    </section>
</main>

<script>
    document.addEventListener("DOMContentLoaded", () => {
       
    });
</script>
</body>
</html>
